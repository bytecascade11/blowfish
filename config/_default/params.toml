# -- Theme Options --

colorScheme = "blowfish"          # Change later to "avocado", "slate", "neon", etc. if you want
defaultAppearance = "light"
autoSwitchAppearance = true

enableA11y = false
enableSearch = true
enableCodeCopy = true             # Nice for code snippets in reviews
enableStructuredBreadcrumbs = true

replyByEmail = false

disableImageOptimization = false
disableImageOptimizationMD = false
disableTextInHeader = false
hotlinkFeatureImage = false

fingerprintAlgorithm = "sha512"

[header]
  layout = "basic"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false     # Optional: hide "Powered by Blowfish" if you prefer
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"               # Keep "profile" to show your author bio nicely
  showRecent = true                # ← THIS makes recent posts appear on homepage
  showRecentItems = 10             # Show up to 10 recent posts
  showMoreLink = true
  showMoreLinkDest = "/posts/"     # Link to full blog list
  cardView = true                  # Optional: nicer card layout for recent posts
  cardViewScreenWidth = false

[article]
  showDate = true
  showAuthor = true
  showHero = true                  # ← THIS enables large hero images on every post!
  heroStyle = "big"                # Options: "basic", "big", "background" – "big" is perfect for reviews
  showBreadcrumbs = true
  showDraftLabel = true
  showHeadingAnchors = true
  showReadingTime = true
  showTableOfContents = true       # Great for long reviews
  showWordCount = true
  showZenMode = false

[list]
  showHero = false
  showSummary = true               # Show excerpt on list pages
  showCards = true                 # Card style for category/blog lists
  groupByYear = false              # Cleaner without year grouping

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  cardView = true

[term]
  cardView = true
  cardViewScreenWidth = false
