# -- Theme Options --

colorScheme = "blowfish"          # Change to "avocado", "slate", "neon", "cherry", "ocean" etc. later if you want
defaultAppearance = "light"
autoSwitchAppearance = true

enableA11y = false
enableSearch = true
enableCodeCopy = true             # Perfect for future code snippets or tutorials
enableStructuredBreadcrumbs = true

replyByEmail = false

disableImageOptimization = false
disableImageOptimizationMD = false
disableTextInHeader = false
hotlinkFeatureImage = false

fingerprintAlgorithm = "sha512"

[header]
  layout = "basic"                # You can try "fixed-fill" or "fixed-gradient" later

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false    # Hides "Theme by Blowfish" credit
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "custom"               # Enables custom homepage – content from layouts/partials/home/custom.html
  showRecent = true               # Keeps recent posts
  showRecentItems = 10
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = true
  cardViewScreenWidth = false

[article]
  showDate = true
  showAuthor = true
  showHero = true
  heroStyle = "big"
  showBreadcrumbs = true
  showDraftLabel = true
  showHeadingAnchors = true
  showReadingTime = true
  showTableOfContents = true
  showWordCount = true
  showZenMode = false

  showRelatedContent = true
  relatedContentLimit = 6

[list]
  showHero = false
  showSummary = true
  showCards = true
  groupByYear = false

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  cardView = true

[term]
  cardView = true
  cardViewScreenWidth = false
