# -- Theme Options --

colorScheme = "blowfish"          # Change to "avocado", "slate", "neon", "cherry", "ocean" etc. later if you want
defaultAppearance = "light"
autoSwitchAppearance = true

enableA11y = false
enableSearch = true
enableCodeCopy = true             # Perfect for future code snippets or tutorials
enableStructuredBreadcrumbs = true

replyByEmail = false

disableImageOptimization = false
disableImageOptimizationMD = false
disableTextInHeader = false
hotlinkFeatureImage = false

fingerprintAlgorithm = "sha512"

[header]
  layout = "basic"                # You can try "fixed-fill" or "fixed-gradient" later

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false    # Hides "Theme by Blowfish" credit
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "page"                 # ← CHANGED: Now "page" so subscription form goes to the bottom
  showRecent = true               # Shows recent posts on homepage (at the top)
  showRecentItems = 10            # Number of recent posts to display
  showMoreLink = true
  showMoreLinkDest = "/posts/"    # "View all posts" button link
  cardView = true                 # Recent posts shown as nice cards
  cardViewScreenWidth = false

[article]
  showDate = true
  showAuthor = true
  showHero = true                 # Enables large hero/cover image on every post
  heroStyle = "big"               # "big" is best for tech reviews (full-width hero)
  showBreadcrumbs = true
  showDraftLabel = true
  showHeadingAnchors = true
  showReadingTime = true
  showTableOfContents = true      # Auto TOC for long articles
  showWordCount = true
  showZenMode = false

  showRelatedContent = true       # Enables the related articles section
  relatedContentLimit = 6         # Number of related articles to show

[list]
  showHero = false
  showSummary = true              # Shows excerpt on category/blog list pages
  showCards = true                # Category pages (News, Reviews, etc.) use card layout
  groupByYear = false             # Cleaner look without year grouping

[sitemap]
  excludedKinds = ["taxonomy", "term"]  # Keeps sitemap clean (excludes /tags/ and /categories/)

[taxonomy]
  showTermCount = true
  cardView = true

[term]
  cardView = true
  cardViewScreenWidth = false
